version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: familycare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: familycare
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: familycare-redis
    ports:
      - "6379:6379" 
    volumes:
      - redis_data:/data
    restart: unless-stopped

  bull-board:
    image: deadly0/bull-board
    container_name: familycare-bullboard
    ports:
      - "3005:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

volumes:
  mysql_data:
  redis_data: